<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

    <div class="card w-full max-w-md bg-white shadow-lg p-8 rounded-xl mx-4 border border-gray-200">
        <div class="flex flex-col items-center mb-6">
            <svg class="w-14 h-14 text-gray-900 mb-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
            </svg>
            <h1 class="text-2xl font-bold text-center text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-center text-gray-500 mt-2 text-sm">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
            <div class="form-control">
                <label class="label"><span class="label-text font-semibold text-gray-700">Username</span></label>
                <input id="username" type="text" class="input input-bordered w-full focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 rounded-lg text-sm" placeholder="Enter Username" onkeypress="if(event.key === 'Enter') login()" />
                <label class="label"><span class="label-text-alt text-blue-600 font-medium">Default: admin</span></label>
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text font-semibold text-gray-700">Password</span></label>
                <input id="password" type="password" class="input input-bordered w-full focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 rounded-lg text-sm" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') login()" />
                <label class="label"><span class="label-text-alt text-blue-600 font-medium">Default: admin123</span></label>
            </div>

            <button onclick="login()" class="btn w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white border-none rounded-lg font-semibold">
                Sign In
            </button>

            <div class="divider text-gray-400 text-sm mt-6 mb-4">OR</div>

            <div class="text-center mb-4 text-gray-500 text-sm">Demo Credentials:</div>
            
            <div class="bg-gray-50 rounded-lg p-4 flex flex-col items-center justify-center space-y-1">
                <p class="text-sm"><span class="font-semibold text-gray-800">Username:</span> <span class="text-gray-600">admin</span></p>
                <p class="text-sm"><span class="font-semibold text-gray-800">Password:</span> <span class="text-gray-600">admin123</span></p>
            </div>
        </div>
    </div>

    <!-- Alert functionality will be handled via script -->
    <div id="loginAlertBox" class="toast toast-top toast-center hidden z-50"></div>

    <script src="script.js"></script>

</body>

</html>
